    <script>
      const TYPEWRITER_TEXT =
        "Scale your video production with custom-built AI agents.";
      const HIGHLIGHT_TEXT = "video production";
      const typewriterCopy = document.getElementById("typewriter-copy");
      const typewriterCaret = document.getElementById("typewriter-caret");
      const heroActions = document.getElementById("hero-actions");
      const video = document.getElementById("hero-video");
      const menuToggle = document.getElementById("mobile-menu-toggle");
      const mobileMenu = document.getElementById("mobile-menu");
      const clientLogos = document.querySelector(".client-logos");

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderTypewriterText(visibleText) {
        const start = TYPEWRITER_TEXT.indexOf(HIGHLIGHT_TEXT);
        const end = start + HIGHLIGHT_TEXT.length;
        const visibleLength = visibleText.length;

        if (visibleLength <= start) {
          typewriterCopy.textContent = visibleText;
          return;
        }

        const prefix = TYPEWRITER_TEXT.slice(0, start);
        const highlighted = TYPEWRITER_TEXT.slice(
          start,
          Math.min(visibleLength, end)
        );
        const suffix =
          visibleLength > end ? TYPEWRITER_TEXT.slice(end, visibleLength) : "";

        typewriterCopy.innerHTML =
          escapeHtml(prefix) +
          '<span class="emphasized-text">' +
          escapeHtml(highlighted) +
          "</span>" +
          escapeHtml(suffix);
      }

      function startTypewriter() {
        let index = 0;

        window.setTimeout(() => {
          const intervalId = window.setInterval(() => {
            index += 1;
            renderTypewriterText(TYPEWRITER_TEXT.slice(0, index));

            if (index >= TYPEWRITER_TEXT.length) {
              window.clearInterval(intervalId);
              typewriterCaret.classList.add("is-hidden");
            }
          }, 38);
        }, 600);
      }

      function revealActions() {
        window.setTimeout(() => {
          heroActions.classList.add("is-visible");
        }, 400);
      }

      function bindVideoScrub() {
        if (!video) {
          return;
        }

        let previousX = null;
        let targetTime = 0;
        let seeking = false;
        const mouseSensitivity = 0.8;
        const touchSensitivity = 0.35;

        const clampTarget = (time) => {
          const duration = Number.isFinite(video.duration) ? video.duration : 0;
          return Math.min(Math.max(time, 0), duration);
        };

        const seekToTarget = () => {
          if (!Number.isFinite(video.duration) || video.duration <= 0) {
            return;
          }

          seeking = true;
          video.currentTime = clampTarget(targetTime);
        };

        const scrubFromClientX = (clientX, sensitivity) => {
          if (!Number.isFinite(video.duration) || video.duration <= 0) {
            previousX = clientX;
            return;
          }

          if (previousX === null) {
            previousX = clientX;
            return;
          }

          const delta = clientX - previousX;
          previousX = clientX;
          targetTime = clampTarget(
            targetTime +
              (delta / window.innerWidth) * sensitivity * video.duration
          );

          if (!seeking) {
            seekToTarget();
          }
        };

        const handleMouseMove = (event) => {
          scrubFromClientX(event.clientX, mouseSensitivity);
        };

        const handlePointerMove = (event) => {
          const sensitivity =
            event.pointerType === "touch" ? touchSensitivity : mouseSensitivity;
          scrubFromClientX(event.clientX, sensitivity);
        };

        const handleTouchMove = (event) => {
          const touch = event.touches[0];

          if (!touch) {
            return;
          }

          scrubFromClientX(touch.clientX, touchSensitivity);
        };

        const resetScrub = () => {
          previousX = null;
        };

        video.addEventListener("loadedmetadata", () => {
          targetTime = video.currentTime;
        });

        video.addEventListener("seeked", () => {
          const hasMoved = Math.abs(video.currentTime - targetTime) > 1 / 30;

          if (hasMoved) {
            seekToTarget();
            return;
          }

          seeking = false;
        });

        if ("PointerEvent" in window) {
          window.addEventListener("pointermove", handlePointerMove, {
            passive: true,
          });
          window.addEventListener("pointerup", resetScrub, { passive: true });
          window.addEventListener("pointercancel", resetScrub, {
            passive: true,
          });
        } else {
          window.addEventListener("mousemove", handleMouseMove);
          window.addEventListener("touchmove", handleTouchMove, {
            passive: true,
          });
          window.addEventListener("touchend", resetScrub, { passive: true });
          window.addEventListener("touchcancel", resetScrub, { passive: true });
        }
      }

      function bindMobileMenu() {
        const closeMenu = () => {
          menuToggle.classList.remove("is-open");
          menuToggle.setAttribute("aria-expanded", "false");
          menuToggle.setAttribute("aria-label", "Open menu");
          mobileMenu.classList.remove("is-open");
          mobileMenu.setAttribute("aria-hidden", "true");
        };

        menuToggle.addEventListener("click", () => {
          const nextOpen = !menuToggle.classList.contains("is-open");
          menuToggle.classList.toggle("is-open", nextOpen);
          menuToggle.setAttribute("aria-expanded", String(nextOpen));
          menuToggle.setAttribute(
            "aria-label",
            nextOpen ? "Close menu" : "Open menu"
          );
          mobileMenu.classList.toggle("is-open", nextOpen);
          mobileMenu.setAttribute("aria-hidden", String(!nextOpen));
        });

        mobileMenu.querySelectorAll("a").forEach((link) => {
          link.addEventListener("click", closeMenu);
        });
      }

      function bindClientLogoLoop() {
        if (!clientLogos) {
          return;
        }

        const firstLogo = clientLogos.querySelector(".client-logo");
        const firstClone = clientLogos.querySelector(".is-loop-clone");

        if (!firstLogo || !firstClone) {
          return;
        }

        let loopWidth = 0;
        let isAdjusting = false;

        const measureLoop = () => {
          loopWidth = firstClone.offsetLeft - firstLogo.offsetLeft;
        };

        const loopScroll = () => {
          if (isAdjusting || loopWidth <= 0) {
            return;
          }

          if (clientLogos.scrollLeft >= loopWidth) {
            isAdjusting = true;
            clientLogos.scrollLeft -= loopWidth;
            window.requestAnimationFrame(() => {
              isAdjusting = false;
            });
          }
        };

        measureLoop();
        clientLogos.addEventListener("scroll", loopScroll, { passive: true });
        window.addEventListener("resize", measureLoop, { passive: true });
      }

      startTypewriter();
      revealActions();
      bindVideoScrub();
      bindMobileMenu();
      bindClientLogoLoop();
    </script>
